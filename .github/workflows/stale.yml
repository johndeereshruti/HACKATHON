# This workflow sends open PR information to a Microsoft Teams channel/chat.
name: Send PR info to Teams

on:
  workflow_dispatch:

jobs:
  pr-report:

    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
    - name: Build and send PR report to Teams
      uses: actions/github-script@v7
      env:
        TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      with:
        script: |
          const webhook = process.env.TEAMS_WEBHOOK_URL;
          if (!webhook) {
            core.setFailed('Missing TEAMS_WEBHOOK_URL secret.');
            return;
          }

          const { owner, repo } = context.repo;
          const prs = await github.paginate(github.rest.pulls.list, {
            owner,
            repo,
            state: 'open',
            per_page: 100
          });

          const top = prs.slice(0, 20);
          const cardBody = [
            {
              type: 'TextBlock',
              text: `PR report for ${owner}/${repo}`,
              weight: 'Bolder',
              size: 'Medium'
            },
            {
              type: 'TextBlock',
              text: `Open PR count: ${prs.length}`,
              wrap: true,
              spacing: 'Small'
            }
          ];

          if (top.length === 0) {
            cardBody.push({
              type: 'TextBlock',
              text: 'No open PRs right now.',
              wrap: true,
              spacing: 'Medium'
            });
          } else {
            top.forEach((pr) => {
              cardBody.push({
                type: 'TextBlock',
                text: `[#${pr.number}](${pr.html_url}) ${pr.title} - ${pr.user.login}`,
                wrap: true,
                spacing: 'Small'
              });
            });
          }

          const adaptiveCard = {
            type: 'AdaptiveCard',
            $schema: 'http://adaptivecards.io/schemas/adaptive-card.json',
            version: '1.4',
            body: cardBody
          };

          const response = await fetch(webhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(adaptiveCard)
          });

          if (!response.ok) {
            const body = await response.text();
            core.setFailed(`Teams webhook failed: ${response.status} ${body}`);
          }

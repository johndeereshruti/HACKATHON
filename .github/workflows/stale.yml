# This workflow sends open PR information to a Microsoft Teams channel/chat.
name: Send PR info to Teams

on:
  schedule:
  - cron: '50 14 * * *'

jobs:
  pr-report:

    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
    - name: Build and send PR report to Teams
      uses: actions/github-script@v7
      env:
        TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      with:
        script: |
          const webhook = process.env.TEAMS_WEBHOOK_URL;
          if (!webhook) {
            core.setFailed('Missing TEAMS_WEBHOOK_URL secret.');
            return;
          }

          const { owner, repo } = context.repo;
          const prs = await github.paginate(github.rest.pulls.list, {
            owner,
            repo,
            state: 'open',
            per_page: 100
          });

          const top = prs.slice(0, 20);
          const prLines = top.length
            ? top.map((pr) => `- #${pr.number}: ${pr.title} by ${pr.user.login} (${pr.html_url})`)
            : ['- No open PRs right now.'];

          const text = [
            `PR report for ${owner}/${repo}`,
            `Open PR count: ${prs.length}`,
            '',
            ...prLines
          ].join('\n');

          const response = await fetch(webhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
          });

          if (!response.ok) {
            const body = await response.text();
            core.setFailed(`Teams webhook failed: ${response.status} ${body}`);
          }

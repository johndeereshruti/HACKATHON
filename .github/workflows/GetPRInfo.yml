# This workflow sends open PR information to a Microsoft Teams channel/chat.
name: Send PR info to Teams

on:
  # Run manually from the Actions tab.
  workflow_dispatch:

jobs:
  pr-report:

    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
    - name: Build and send PR report to Teams
      uses: actions/github-script@v7
      env:
        # Incoming webhook URL stored securely in repository secrets.
        TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      with:
        script: |
          // Read webhook URL from environment and fail fast if missing.
          const webhook = process.env.TEAMS_WEBHOOK_URL;
          if (!webhook) {
            core.setFailed('Missing TEAMS_WEBHOOK_URL secret.');
            return;
          }

          // Fetch open pull requests for the current repository.
          const { owner, repo } = context.repo;
          const { data: prs } = await github.rest.pulls.list({
            owner,
            repo,
            state: 'open',
            per_page: 20
          });

          // Use a fixed-size list for predictable card length.
          const top = prs;
          // Start the Adaptive Card body with a title and summary line.
          const cardBody = [
            {
              type: 'TextBlock',
              text: `PR report for ${owner}/${repo}`,
              weight: 'Bolder',
              size: 'Medium'
            },
            {
              type: 'TextBlock',
              text: `Showing up to ${top.length} open PRs`,
              wrap: true,
              spacing: 'Small'
            }
          ];

          // Add either an empty-state message or one line per PR.
          if (top.length === 0) {
            cardBody.push({
              type: 'TextBlock',
              text: 'No open PRs right now.',
              wrap: true,
              spacing: 'Medium'
            });
          } else {
            top.forEach((pr) => {
              const createdDate = new Date(pr.created_at);
              const createdDateText = createdDate.toISOString().split('T')[0];
              const ageDays = Math.floor((Date.now() - createdDate.getTime()) / (1000 * 60 * 60 * 24));
              const isOlderThan3Days = ageDays > 3;
              const status = pr.draft ? 'Draft' : 'Open';
              const ageLabel = isOlderThan3Days ? ' [OLDER THAN 3 DAYS]' : '';

              cardBody.push({
                type: 'TextBlock',
                text: `[#${pr.number}](${pr.html_url}) ${pr.title} - ${pr.user.login} | Status: ${status} | Date: ${createdDateText}${ageLabel}`,
                wrap: true,
                spacing: 'Small',
                color: isOlderThan3Days ? 'Attention' : 'Default'
              });
            });
          }

          // Build the final Adaptive Card payload for Teams.
          const adaptiveCard = {
            type: 'AdaptiveCard',
            $schema: 'http://adaptivecards.io/schemas/adaptive-card.json',
            version: '1.4',
            body: cardBody
          };

          // Send the card to Teams and surface any webhook errors.
          const response = await fetch(webhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(adaptiveCard)
          });

          if (!response.ok) {
            const body = await response.text();
            core.setFailed(`Teams webhook failed: ${response.status} ${body}`);
          }
